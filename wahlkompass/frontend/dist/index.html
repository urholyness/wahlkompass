<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wahlkompass — belegbasierter Wahlkompass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAFAF7; --ink:#1A1C1E; --graphite:#5A5F63; --petrol:#0F6B6E; --petrol-d:#0a4d4f;
  --signal:#B4541E; --seal:#2E7D4F; --line:#e3e0d7; --card:#fff; --soft:#f2f0ea;
}
*{box-sizing:border-box}
body{margin:0;background:#e9e7e1;color:var(--ink);font-family:"Public Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.app{max-width:460px;margin:0 auto;min-height:100vh;background:var(--paper);display:flex;flex-direction:column;position:relative;box-shadow:0 0 40px rgba(0,0,0,.06)}
.mono{font-family:"JetBrains Mono",monospace}
button{font-family:inherit}
.pad{padding:24px 22px}
.preview-banner{background:#2A211C;color:#E7DECF;font:500 11px/1.4 "JetBrains Mono",monospace;padding:8px 22px;display:flex;gap:8px;align-items:center}
.preview-banner b{color:#E9982E}
.eyebrow{font:500 11px/1 "JetBrains Mono",monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--graphite)}
.h1{font:700 30px/1.15 "Archivo",sans-serif;letter-spacing:-.01em;margin:0}
.h2{font:700 21px/1.15 "Archivo",sans-serif;margin:0}
.sub{color:var(--graphite);font-size:14px;line-height:1.5}
.seal{display:inline-flex;align-items:center;gap:7px;font:500 12px "JetBrains Mono",monospace;color:var(--seal)}
.seal .ring{width:18px;height:18px;border-radius:50%;border:2px solid var(--petrol);display:inline-flex;align-items:center;justify-content:center}
.seal .ring i{width:7px;height:4px;border-left:2px solid var(--seal);border-bottom:2px solid var(--seal);transform:rotate(-45deg);margin-top:-2px}
.btn{all:unset;display:block;text-align:center;padding:15px;border-radius:12px;font:600 15px "Public Sans";cursor:pointer}
.btn.primary{background:var(--petrol);color:#fff}
.btn.ghost{border:1px solid #bfd6d6;color:var(--petrol)}
.card{border:1px solid var(--line);border-radius:14px;background:var(--card)}
.spacer{flex:1}
.footer{border-top:1px solid var(--line);padding:12px 22px;font:400 11px "Public Sans";color:var(--graphite);display:flex;gap:8px;align-items:center;justify-content:space-between}
.link{color:var(--petrol);font-weight:600;cursor:pointer;text-decoration:none}
.prog{height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.prog>i{display:block;height:100%;background:var(--petrol);transition:width .2s}
.scale{display:flex;gap:8px}
.scale button{all:unset;flex:1;height:46px;border:1px solid #cfccc4;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s}
.scale button.on{border:2px solid var(--petrol);background:var(--petrol)}
.scale button .dot{border-radius:50%;background:var(--graphite)}
.scale button.on .dot{background:#fff}
.scale-lab{display:flex;justify-content:space-between;margin-top:7px;font:400 9.5px "Public Sans";color:var(--graphite)}
.chip{display:inline-flex;align-items:center;gap:6px;font:600 13px "Public Sans"}
.chip .sw{width:14px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,.15);flex:none}
.bar{position:relative;height:16px;display:flex;align-items:center}
.bar .track{position:absolute;left:0;right:0;height:8px;border-radius:4px;background:#e8e5dc}
.bar .fill{position:absolute;left:0;height:8px;border-radius:4px;background:var(--petrol)}
.bar .whisk{position:absolute;height:16px;border-left:1.5px solid var(--graphite);border-right:1.5px solid var(--graphite)}
.bar .whisk::after{content:"";position:absolute;left:0;right:0;top:50%;height:1.5px;background:var(--graphite)}
.tiebracket{border-left:1.5px solid #c9b8a0;border-radius:5px 0 0 5px;margin-left:6px;padding-left:12px}
.tier{font:600 10px "JetBrains Mono";padding:3px 7px;border-radius:3px;display:inline-block}
.tier.t1{border:1.5px solid var(--ink);color:var(--ink)}
.tier.t2{border:1.5px solid var(--graphite);border-radius:9px;color:var(--graphite)}
.tier.t3{border:1.5px solid #9aa;color:#889}
.kbp{color:#9A8E7F;font:500 12px "JetBrains Mono"}
.divdot{width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none;display:inline-block}
.evcard{border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:#fff;margin-top:8px}
.extract{margin-top:8px;padding:8px 10px;background:var(--soft);border-radius:7px;font:400 11.5px/1.45 "JetBrains Mono";color:var(--ink)}
.tag{padding:3px 8px;border-radius:7px;background:var(--soft);font:500 11px "JetBrains Mono";color:var(--graphite)}
.warn{border:1px solid #e6c9a8;background:#fbf3e6;border-radius:12px;padding:12px 14px;font-size:13px;color:#7a5a2a}
.fail{border:1px solid #e0b4b4;background:#fbe9e9;border-radius:12px;padding:14px 16px;font-size:13px;color:#8a2a2a}
.skel{background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:sk 1.2s infinite;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media (prefers-reduced-motion: reduce){.skel{animation:none}.prog>i{transition:none}.scale button{transition:none}}
/* ---- desktop "precision terminal" ---- */
.desknav{display:none}
.mobnav{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;border-bottom:1px solid var(--line);background:#fcfbf8;position:sticky;top:0;z-index:5}
.mobnav a{all:unset;white-space:nowrap;padding:7px 12px;border-radius:20px;font:600 12px "Public Sans";color:var(--graphite);cursor:pointer;border:1px solid var(--line)}
.mobnav a.on{background:var(--petrol);color:#fff;border-color:var(--petrol)}
.matrix{width:100%;border-collapse:collapse;font-size:12px}
.matrix th,.matrix td{border:1px solid var(--line);padding:0}
.matrix thead th{background:var(--soft);font:600 11px "JetBrains Mono";color:var(--graphite);padding:6px 4px;text-align:center;position:sticky;top:0}
.matrix tbody th{text-align:left;font:600 12px "Public Sans";padding:8px 10px;background:#fff;max-width:230px}
.cellbox{width:100%;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.pglyph{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 10px "JetBrains Mono"}
.kmatrix{width:100%;border-collapse:collapse;font:600 11px "JetBrains Mono"}
.kmatrix td,.kmatrix th{border:1px solid var(--line);padding:6px 5px;text-align:center}
.kcard{border:1px solid var(--line);border-radius:12px;background:#fff;padding:14px;margin-top:10px}
.meter{height:8px;border-radius:4px;background:#e8e5dc;position:relative;overflow:hidden}
.meter>i{position:absolute;left:0;top:0;bottom:0;background:var(--petrol);border-radius:4px}
.seatbar{height:20px;border-radius:4px;background:#eee;position:relative;display:flex;overflow:hidden}
.seatbar .maj{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);z-index:2}
.dumbbell{position:relative;height:24px;margin:4px 0}
.dumbbell .axis{position:absolute;left:0;right:0;top:11px;height:2px;background:#e0ddd4}
.dumbbell .conn{position:absolute;top:11px;height:2px;background:var(--signal)}
.dumbbell .said,.dumbbell .did{position:absolute;top:5px;width:14px;height:14px;border-radius:50%;font:600 8px "JetBrains Mono";display:flex;align-items:center;justify-content:center;color:#fff}
.dumbbell .said{background:var(--graphite)}
.dumbbell .did{background:var(--ink)}
@media(min-width:900px){
  body{background:#dedbd4}
  .app{max-width:1180px;min-height:100vh}
  .app.analysis{max-width:1180px}
  .deskshell{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 34px)}
  .deskshell.noNav{grid-template-columns:1fr}
  .desknav{display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--line);padding:18px 14px;background:#fcfbf8}
  .desknav a{all:unset;display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;font:600 13px "Public Sans";color:var(--graphite);cursor:pointer}
  .desknav a.on{background:var(--petrol);color:#fff}
  .desknav a:hover:not(.on){background:var(--soft)}
  .deskmain{padding:26px 30px;overflow-x:auto}
  .frage-wrap{max-width:560px;margin:0 auto}
  .mobnav{display:none}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const PINNED_PUBKEY = "nrxawm7tf2cEdXIr94CXSj/KLdoU3VvrCfEF3xIJ3cY=";
const RELEASE_BASE  = "./release/2026.11.1-preview/";
const MIN_ANSWERS = 10;

let RELEASE=null, meta, statements, parties, positions, evidence;
const posOf = (pid,slug)=> (positions[pid+":"+slug] || {p:null});

// ---- storage ----
const store = (()=>{ try{const k="wk";localStorage.setItem(k,localStorage.getItem(k)||"{}");
  return {get:()=>JSON.parse(localStorage.getItem(k)||"{}"),set:v=>localStorage.setItem(k,JSON.stringify(v))};}
  catch(e){let m={};return {get:()=>m,set:v=>m=v};}})();
let S = Object.assign({screen:"start", i:0, answers:{}, easy:false, openParty:null, openBeleg:{}}, store.get());
function save(){ store.set({answers:S.answers, easy:S.easy}); }

// ---- verification (SubtleCrypto Ed25519 + byte-exact SHA-256 manifest) ----
function b64ToBytes(b64){ const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u; }
async function sha256hex(buf){ const h=await crypto.subtle.digest("SHA-256",buf);
  return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,"0")).join(""); }

async function loadAndVerify(){
  const dec = new TextDecoder();
  const metaBytes = await (await fetch(RELEASE_BASE+"meta.json")).arrayBuffer();
  const m = JSON.parse(dec.decode(metaBytes));

  // 1. pinned pubkey
  if(m.pubkey_b64 !== PINNED_PUBKEY)
    return {ok:false, blocking:true, reason:"Der öffentliche Schlüssel des Bündels stimmt nicht mit dem in dieser Seite fest verankerten Schlüssel überein.", meta:m};

  // 2. Ed25519 signature over the signed manifest
  let sigOk=false;
  try{
    const key = await crypto.subtle.importKey("raw", b64ToBytes(m.pubkey_b64), {name:"Ed25519"}, false, ["verify"]);
    sigOk = await crypto.subtle.verify({name:"Ed25519"}, key, b64ToBytes(m.signature_b64), new TextEncoder().encode(m.signed_payload));
  }catch(e){
    return {ok:false, blocking:false, reason:"Dieser Browser kann Ed25519-Signaturen nicht prüfen ("+(e.message||e)+"). Die Daten werden ungeprüft angezeigt.", meta:m, unsupported:true};
  }
  if(!sigOk)
    return {ok:false, blocking:true, reason:"Die kryptografische Signatur des Bündels ist ungültig.", meta:m};

  // 3. byte-exact content: every file hash must match the signed manifest
  const manifest = JSON.parse(m.signed_payload);
  const files = {};
  for(const name of Object.keys(manifest.files)){
    const bytes = await (await fetch(RELEASE_BASE+name)).arrayBuffer();
    if(await sha256hex(bytes) !== manifest.files[name])
      return {ok:false, blocking:true, reason:"Die Datei "+name+" weicht vom signierten Original ab (Hash stimmt nicht).", meta:m};
    files[name.replace(".json","")] = JSON.parse(dec.decode(bytes));
  }
  return {ok:true, meta:m, files};
}

// ---- v1.2 scorer (port of pipeline/src/scoring.py) ----
function matchScore(answers, pid){
  let num=0,den=0,rss=0,lin=0,n=0;
  for(const slug in answers){
    const pos=posOf(pid,slug); if(pos.p==null) continue;
    const {u,w}=answers[slug]; const c=pos.confidence==null?0:pos.confidence; const r=1-c;
    num+=w*Math.abs(u-pos.p); den+=w; rss+=(w*r)**2; lin+=w*r; n++;
  }
  if(den===0) return {S:null,h:null,hmax:null,n:0};
  return {S:1-num/(2*den), h:Math.sqrt(rss)/(2*den), hmax:lin/(2*den), n};
}
function rankParties(answers){
  let scored=parties.map(p=>Object.assign({pid:p.id,party:p}, matchScore(answers,p.id)));
  let rankable=scored.filter(s=>s.S!=null).sort((a,b)=> b.S-a.S || String(a.pid).localeCompare(String(b.pid)));
  let rank=0;
  rankable.forEach((s,i)=>{ if(i===0){rank=1;} else { const prev=rankable[i-1];
    const bound=Math.max(s.hmax||0, prev.hmax||0); if(Math.abs(prev.S-s.S)>=bound) rank=i+1; }
    s.rank=rank; });
  const noOverlap=scored.filter(s=>s.S==null).map(s=>(s.rank=null,s))
    .sort((a,b)=>String(a.party.short_name).localeCompare(String(b.party.short_name)));
  return {ranked:rankable.concat(noOverlap), low:Object.keys(answers).length<MIN_ANSWERS};
}
const pct=x=>Math.round(x*100), pp=x=>Math.round(x*100);

const SCALE=[{u:-1,l:"lehne stark ab",s:16},{u:-0.5,l:"lehne ab",s:11},{u:0,l:"neutral",s:7},{u:0.5,l:"stimme zu",s:11},{u:1,l:"stimme stark zu",s:16}];
const el=(h)=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;};
function chip(p){return `<span class="chip"><span class="sw" style="background:${p.color_hex}"></span>${p.short_name}</span>`;}

// ---- render ----
const ANALYSIS=["ergebnis","koalitionen","sagen-tun","themen","methodik"];
const NAV=[["ergebnis","Ergebnis"],["koalitionen","Koalitionen"],["sagen-tun","Sagen vs. Tun"],["themen","Themen"],["methodik","Methodik"]];
function screenOf(){
  return S.screen==="frage"?screenFrage()
    :S.screen==="koalitionen"?screenKoalitionen()
    :S.screen==="sagen-tun"?screenSagenTun()
    :S.screen==="themen"?screenThemen()
    :S.screen==="ergebnis"?screenErgebnis()
    :S.screen==="methodik"?screenMethodik()
    :screenStart();
}
function deskNav(){
  return `<nav class="desknav">
    <div class="eyebrow" style="padding:0 12px 10px">Wahlkompass</div>
    ${NAV.map(([k,l])=>`<a data-go="${k}" class="${S.screen===k?'on':''}">${l}</a>`).join("")}
    <div class="spacer" style="min-height:20px"></div>
    <div style="padding:10px 12px;border-top:1px solid var(--line)">${sealHtml()}</div>
  </nav>`;
}
function render(){
  const app=document.getElementById("app"); app.innerHTML="";
  app.className = "app" + (ANALYSIS.includes(S.screen)?" analysis":"");
  const banner = meta.preview ? `<div class="preview-banner"><b>VORSCHAU</b> ${meta.preview_label_de}</div>` : "";
  let body;
  if(ANALYSIS.includes(S.screen)){
    const mobnav=`<nav class="mobnav">${NAV.map(([k,l])=>`<a data-go="${k}" class="${S.screen===k?'on':''}">${l}</a>`).join("")}</nav>`;
    body = `<div class="deskshell">${deskNav()}<main class="deskmain">${mobnav}${screenOf()}</main></div>`;
  } else if(S.screen==="frage"){
    body = `<div class="frage-wrap">${screenOf()}</div>`;
  } else {
    body = screenOf();
  }
  const tpl=document.createElement("template"); tpl.innerHTML=(banner+body).trim();
  app.append(...tpl.content.childNodes);
  if(ANALYSIS.includes(S.screen)) location.hash = "/"+S.screen;
  bind();
  window.scrollTo(0,0);
}

function sealHtml(){ return meta.signature_verified
  ? `<span class="seal"><span class="ring"><i></i></span>Signatur geprüft · ${meta.release}</span>`
  : `<span class="seal" style="color:var(--signal)">Signatur nicht geprüft</span>`; }

function screenStart(){
  const covered = Object.values(positions).filter(v=>v.p!=null).length;
  return `<div class="pad" style="display:flex;flex-direction:column;min-height:calc(100vh - 34px)">
    <div class="eyebrow">Wahlkompass · Release ${meta.release}</div>
    <h1 class="h1" style="margin-top:40px">${statements.length} Aussagen. Für jede Partei, wie nah sie Ihnen ist — mit Beleg.</h1>
    <p class="sub" style="margin-top:16px">Jede Zahl ist einen Fingertipp von den Dokumenten entfernt, die sie erzeugt haben — echte namentliche Abstimmungen des Bundestags.</p>
    <div class="card pad" style="margin-top:22px;padding:16px">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <span class="seal"><span class="ring"><i></i></span></span>
        <div style="font:600 13px/1.35 'Public Sans'">Ihre Antworten verlassen dieses Gerät nicht. Kein Konto, kein Server, kein Tracking.</div>
      </div>
      <div class="sub" style="margin-top:10px;font-size:12px">${sealHtml()}</div>
    </div>
    <div class="spacer"></div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:24px">
      <button class="btn primary" data-go="frage">Los geht's</button>
      <button class="btn ghost" data-go="themen">Nur Daten ansehen</button>
    </div>
  </div>`;
}

function screenFrage(){
  const st=statements[S.i]; const a=S.answers[st.id];
  const scale=SCALE.map(o=>`<button data-u="${o.u}" class="${a&&a.u===o.u?'on':''}" aria-label="${o.l}"><span class="dot" style="width:${o.s}px;height:${o.s}px"></span></button>`).join("");
  return `<div style="display:flex;flex-direction:column;min-height:calc(100vh - 34px)">
    <div class="pad" style="padding-bottom:0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="mono" style="font-size:12px;color:var(--graphite)">${S.i+1} / ${statements.length}</span>
        <span class="eyebrow">${st.topic}</span></div>
      <div class="prog" style="margin-top:8px"><i style="width:${(S.i+1)/statements.length*100}%"></i></div>
    </div>
    <div class="pad" style="flex:1;display:flex;flex-direction:column">
      <div class="h2" style="font-size:22px;line-height:1.3">${S.easy? (st.text_easy_de||st.text_de): st.text_de}</div>
      <div style="margin-top:14px;display:flex;gap:16px;align-items:center;font:600 12px 'Public Sans'">
        <label style="color:var(--graphite);cursor:pointer">Leichte Sprache
          <input type="checkbox" id="easy" ${S.easy?'checked':''} style="vertical-align:middle;margin-left:4px"></label>
      </div>
      <div class="spacer"></div>
      <div style="padding-bottom:16px">
        <div class="eyebrow" style="margin-bottom:10px">Ihre Position</div>
        <div class="scale">${scale}</div>
        <div class="scale-lab"><span>lehne stark ab</span><span>neutral</span><span>stimme stark zu</span></div>
        <div style="margin-top:16px;display:flex;gap:10px">
          <button class="btn ghost" style="flex:1;border-style:dashed" data-skip="1">Überspringen</button>
          <button class="btn ${a&&a.w===2?'primary':'ghost'}" style="flex:1" data-weight="1">doppelt gewichten</button>
        </div>
        <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center">
          <button class="link" data-back="1" style="background:none;border:none;${S.i===0?'visibility:hidden':''}">← zurück</button>
          <span class="mono" style="font-size:11px;color:#8a8f92">auf diesem Gerät gespeichert</span>
        </div>
      </div>
    </div></div>`;
}

function screenErgebnis(){
  const {ranked, low}=rankParties(S.answers);
  const answered=Object.keys(S.answers).length;
  let rows="";
  let prevRank=null;
  for(const r of ranked){
    if(r.S==null){
      rows+=`<div class="pad" style="padding:12px 22px;opacity:.7;display:flex;align-items:center;gap:10px">
        ${chip(r.party)}<span class="kbp" style="margin-left:auto">keine belegbare Überschneidung</span></div>`;
      continue;
    }
    const tie = prevRank===r.rank;
    const s=pct(r.S), ci=pp(r.h);
    const fillW=Math.max(0,Math.min(100,s)), wl=Math.max(0,s-ci), ww=Math.min(100,2*ci);
    const total=statements.length, cov=r.n;
    rows+=`<div class="pad ${tie?'tiebracket':''}" style="padding:14px 22px;cursor:pointer" data-party="${r.pid}">
      <div style="display:flex;align-items:center;gap:12px">
        <span class="mono" style="font-weight:600;width:16px;color:${tie?'var(--graphite)':'var(--ink)'}">${tie?'':r.rank}</span>
        ${chip(r.party)}
        <span class="mono" style="margin-left:auto;font-weight:600">${s} % ± ${ci}</span>
      </div>
      <div class="bar" style="margin-top:9px">
        <div class="track"></div><div class="fill" style="width:${fillW}%"></div>
        <div class="whisk" style="left:${wl}%;width:${ww}%"></div>
      </div>
      <div style="margin-top:6px;display:flex;justify-content:space-between">
        <span class="mono" style="font-size:11px;color:var(--graphite)">${cov}/${total} Fragen belegbar</span>
        <span class="link" data-party="${r.pid}">${S.openParty===r.pid?'Belege ausblenden ▴':'Belege ansehen ▾'}</span>
      </div>
      ${S.openParty===r.pid? partyBreakdown(r):""}
    </div>`;
    prevRank=r.rank;
  }
  const lowWarn = low ? `<div class="pad"><div class="warn"><b>Wenige Antworten (${answered}).</b> Unter ${MIN_ANSWERS} Antworten zeigen wir keine belastbare Reihung — bitte weitere Aussagen beantworten.</div></div>`:"";
  return `<div style="display:flex;flex-direction:column;min-height:calc(100vh - 34px)">
    <div class="pad" style="border-bottom:1px solid var(--line)">
      <div class="h2">Ihr Ergebnis</div>
      <div class="sub" style="margin-top:4px;font-size:12px">Reihung nach Übereinstimmung · ${answered} beantwortet · Balken = Wert, ├─┤ = Fehlerspanne</div>

  </div>`;
}

function partyBreakdown(r){
  let out=`<div style="margin-top:12px;border-left:2px solid var(--petrol);padding:2px 0 2px 12px;display:flex;flex-direction:column;gap:8px" onclick="event.stopPropagation()">`;

    const pos=posOf(r.pid,st.id); const key=r.pid+":"+st.id; const open=S.openBeleg[key];
    if(pos.p==null){ out+=`<div style="display:flex;align-items:center;gap:8px;font-size:12px"><span>${st.text_de.slice(0,42)}…</span><span class="kbp" style="margin-left:auto">— keine belegbare Position</span></div>`; continue; }

function belegZug(pos){
  let cards="";
  const ev=(pos.evidence_ids||[]).map(id=>evidence[id]).filter(Boolean).sort((a,b)=>a.tier-b.tier||(a.date<b.date?1:-1));
  for(const e of ev){
    const tclass= e.tier===1?"t1":e.tier===2?"t2":"t3";
    const tlabel= e.tier===1?"T1 ▮ Abstimmung":e.tier===2?"T2 ● Programm":"T3 ◆ Kodierung";
    const src = e.source_url && e.source_url.startsWith("http")
      ? `<a class="link" href="${e.source_url}" target="_blank" rel="noopener">Quelle →</a>` : `<span class="kbp">Quelle folgt</span>`;
    cards+=`<div class="evcard">
      <div style="display:flex;align-items:center;gap:8px"><span class="tier ${tclass}">${tlabel}</span>
        <span class="mono" style="margin-left:auto;font-size:11px;color:var(--graphite)">${e.date}</span></div>
      <div style="font:600 11.5px 'Public Sans';margin-top:8px">${(e.title_de||"").replace(/</g,"&lt;")}</div>
      <div class="extract">${(e.extract||"").replace(/</g,"&lt;")}</div>
      <div style="margin-top:8px;display:flex;gap:12px;align-items:center" class="mono">
        ${src}<span style="color:#9A8E7F;font-size:11px">#${(e.sha256||"").slice(0,10)}…</span></div>
    </div>`;
  }
  const div = pos.divergent ? `<div style="margin-top:8px;font-size:11px;color:var(--signal)">Sagen ≠ Tun: sagt ${pos.p_said}, tut ${pos.p_did} (Regel: |gesagt − getan| > 0,5, für alle Parteien gleich).</div>`:"";
  return `<div style="margin-top:8px">${div}${cards}<div style="margin-top:8px;font-size:11px;color:var(--graphite)">Berechnung: p = ${pos.p.toFixed(2)} aus ${ev.length} Beleg(en) · belegbasiert, nicht Selbstauskunft.</div></div>`;
}

function screenMethodik(){
  return `<div class="pad" style="display:flex;flex-direction:column;gap:14px;min-height:calc(100vh - 34px)">
    <div class="h2">Methodik</div>
    <p class="sub">Der Übereinstimmungswert ist die einzige Rechnung zwischen Ihrer Eingabe und der Reihung — symmetrisch über alle Parteien, ohne gelernte Parameter, ohne KI im Score-Pfad.</p>
    <div class="card pad" style="padding:14px">
      <div class="mono" style="font-size:13px">S(P) = 1 − Σ wᵢ·|uᵢ − pᵢ| / (2·Σ wᵢ)</div>
      <div class="mono" style="font-size:12px;color:var(--graphite);margin-top:8px">τ = (1.0, 0.8, 0.6, 0.3) · λ = ln2/4 · W₀ ≈ 1.30</div>
    </div>
    <div class="card pad" style="padding:14px">
      <div class="eyebrow" style="margin-bottom:8px">Signatur</div>

    </div>

// ---- shared helpers for analysis screens ----
const partyById=id=>parties.find(p=>p.id===id);
function topics(){ const m={}; statements.forEach(s=>{(m[s.topic]=m[s.topic]||[]).push(s);}); return m; }

// position marker on a -1..+1 track (neutral ink marker; confidence -> opacity)
function posCell(pid,slug){
  const pos=posOf(pid,slug);
  if(pos.p==null) return `<div class="cellbox"><span class="kbp" title="keine belegbare Position">—</span></div>`;
  const x=(pos.p+1)/2*100, op=0.35+0.65*(pos.confidence||0);
  const div=pos.divergent?'<span class="divdot" style="position:absolute;top:3px;right:3px"></span>':'';
  return `<div class="cellbox" data-cell="${pid}:${slug}" title="p=${pos.p.toFixed(2)} · KI=${(pos.confidence||0).toFixed(2)}">
    ${div}<div style="position:absolute;left:8px;right:8px;height:3px;background:#e8e5dc;border-radius:2px"></div>
    <div style="position:absolute;left:calc(8px + ${x}% - ${x}*0.16px);width:10px;height:10px;border-radius:50%;background:var(--ink);opacity:${op}"></div></div>`;
}

function screenSagenTun(){
  const div=[];
  for(const p of parties) for(const st of statements){
    const pos=posOf(p.id,st.id);
    if(pos.divergent) div.push({pid:p.id,slug:st.id,pos});
  }
  let body;
  if(!div.length){
    body=`<div class="card" style="margin-top:14px;padding:16px"><div class="sub">In diesem Release gibt es noch keine belegte Divergenz zwischen Programm (Sagen) und Abstimmung (Tun). Sie erscheint automatisch, sobald für eine Partei beide Belegarten zur selben Aussage vorliegen und sich um mehr als 0,5 unterscheiden.</div></div>`;
  } else {
    body=div.map(d=>{
      const said=(d.pos.p_said+1)/2*100, did=(d.pos.p_did+1)/2*100;
      const l=Math.min(said,did), w=Math.abs(said-did);
      const open=S.openBeleg["st:"+d.pid+":"+d.slug];
      return `<div class="card" style="margin-top:10px;padding:14px">
        <div style="display:flex;align-items:center;gap:10px">${chip(partyById(d.pid))}
          <span style="font:600 13px 'Public Sans'">${statements.find(s=>s.id===d.slug).text_de}</span></div>
        <div class="dumbbell" style="margin-top:10px"><div class="axis"></div>
          <div class="conn" style="left:${l}%;width:${w}%"></div>
          <div class="said" style="left:calc(${said}% - 7px)" title="Sagen (Programm)">S</div>
          <div class="did" style="left:calc(${did}% - 7px)" title="Tun (Abstimmung)">T</div></div>
        <div style="display:flex;justify-content:space-between;font:500 11px 'JetBrains Mono';color:var(--graphite)">
          <span>lehnt ab</span><span>S ${d.pos.p_said.toFixed(2)} · T ${d.pos.p_did.toFixed(2)}</span><span>stimmt zu</span></div>
        <div style="margin-top:8px"><span class="link" data-beleg="st:${d.pid}:${d.slug}">${open?'Belege ausblenden ▴':'Sagen &amp; Tun belegen ▾'}</span>
        ${open?belegZug(d.pos):""}</div></div>`;
    }).join("");
  }
  return `<div class="h2">Sagen vs. Tun</div>
    <p class="sub" style="margin-top:4px;font-size:13px">Flagge, wenn |gesagt − getan| &gt; 0,5 — für alle Parteien gleich. <b>S</b> = Position im Wahlprogramm (T2), <b>T</b> = Verhalten in namentlichen Abstimmungen (T1).</p>
    ${body}`;
}

function combos(arr,k){ if(k===0) return [[]]; if(arr.length<k) return []; const [h,...t]=arr; return combos(t,k-1).map(c=>[h,...c]).concat(combos(t,k)); }
function coalitions(){
  const seats=RELEASE.seats||{}, proj=seats.projection||{};
  const majority=seats.majority||(Math.floor((seats.total||630)/2)+1);
  const excl=new Set((RELEASE.exclusions||[]).map(e=>(e.pair||[]).slice().sort().join("|")));
  const pids=Object.keys(proj).filter(p=>proj[p]>0);
  const isExcl=c=>c.some((a,i)=>c.slice(i+1).some(b=>excl.has([a,b].sort().join("|"))));
  const win=[];
  for(let k=2;k<=4;k++) for(const c of combos(pids,k)){
    const sum=c.reduce((s,p)=>s+proj[p],0);
    if(sum<majority||isExcl(c)) continue;
    if(!c.every(p=>(sum-proj[p])<majority)) continue;   // minimal winning
    win.push({parties:c.slice().sort((a,b)=>proj[b]-proj[a]), seats:sum});
  }
  win.sort((a,b)=>a.parties.length-b.parties.length||b.seats-a.seats);
  return {list:win, majority, total:seats.total||630, proj};
}
function coalitionMetrics(members){
  const per=members.map(p=>({p,...matchScore(S.answers,p)})).filter(s=>s.S!=null);
  if(!per.length) return null;
  const proj=(RELEASE.seats||{}).projection||{};
  let wsum=0,sc=0; per.forEach(s=>{const w=proj[s.p]||1; sc+=w*s.S; wsum+=w;});
  const S_C=wsum?sc/wsum:null;
  const h=Math.max(...per.map(s=>s.h||0));
  // disagreement per statement among members with positions
  const dis=[];
  for(const st of statements){
    const ps=members.map(m=>posOf(m,st.id).p).filter(v=>v!=null);
    if(ps.length<2) continue;
    const spread=Math.max(...ps)-Math.min(...ps);
    dis.push({slug:st.id, spread});
  }
  dis.sort((a,b)=>b.spread-a.spread);
  const meanSpread=dis.length?dis.reduce((s,d)=>s+d.spread,0)/dis.length:0;
  const cohesion=1-meanSpread/2;   // spread in [0,2] -> cohesion in [0,1]
  return {S_C, h, cohesion, top:dis.slice(0,3), n:per.length};
}
function screenKoalitionen(){
  const {list,majority,total,proj}=coalitions();
  const answered=Object.keys(S.answers).length;
  const cards=list.map(c=>{
    const m=answered?coalitionMetrics(c.parties):null;
    const segs=c.parties.map(p=>`<div title="${partyById(p).short_name}: ${proj[p]}" style="width:${proj[p]/total*100}%;background:${partyById(p).color_hex}"></div>`).join("");
    const majX=majority/total*100;
    const match=m&&m.S_C!=null?`<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font:600 12px 'JetBrains Mono'"><span>Ihre Übereinstimmung S(C)</span><span>${Math.round(m.S_C*100)} % ± ${Math.round(m.h*100)}</span></div>
      <div class="meter" style="margin-top:5px"><i style="width:${Math.round(m.S_C*100)}%"></i></div></div>
      <div style="margin-top:10px;display:flex;justify-content:space-between;font:600 12px 'JetBrains Mono'"><span>Geschlossenheit Ω(C)</span><span>${Math.round(m.cohesion*100)} %</span></div>
      <div class="meter" style="margin-top:5px"><i style="width:${Math.round(m.cohesion*100)}%;background:var(--graphite)"></i></div>
      <div style="margin-top:10px;font-size:12px;color:var(--graphite)">Uneinig bei: ${m.top.map(t=>{const s=statements.find(x=>x.id===t.slug);return `<span class="tag" style="cursor:pointer" data-go2="themen">${s.text_de.slice(0,34)}…</span>`;}).join(" ")}</div>`:"";
    return `<div class="kcard">
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">${c.parties.map(p=>chip(partyById(p))).join("")}
        <span class="mono" style="margin-left:auto;font-weight:600">${c.seats} Sitze</span></div>
      <div class="seatbar" style="margin-top:10px">${segs}<div class="maj" style="left:${majX}%"></div></div>
      <div style="font:500 10px 'JetBrains Mono';color:var(--graphite);margin-top:4px">rechnerische Mehrheit ab ${majority} von ${total} · Balkenmarke = Mehrheit</div>
      ${match}</div>`;
  }).join("");
  const src=(RELEASE.seats||{}).attribution;
  const asof=(RELEASE.seats||{}).as_of;
  return `<div class="h2">Koalitionen</div>
    <p class="sub" style="margin-top:4px;font-size:13px">Rechnerisch mögliche Mehrheiten aus der aktuellen Sitzprojektion (${asof||"—"}). Beschreibend, keine Vorhersage — nur „rechnerisch möglich" bzw. „durch Beschluss ausgeschlossen".</p>
    ${answered?"":needAnswers("Ihre Übereinstimmung mit einer Koalition S(C)")}
    ${cards}
    <div class="sub" style="margin-top:14px;font-size:11px">Sitzprojektion: ${src?`<a class="link" href="${src.source_url}" target="_blank" rel="noopener">${src.text}</a>`:"dawum.de"} · mechanische Umrechnung, 5%-Hürde. Ausschlüsse laden aus <span class="mono">exclusions.json</span>.</div>`;
}

function bind(){
  document.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{S.screen=b.dataset.go;render();});
  document.querySelectorAll("[data-go2]").forEach(b=>b.onclick=(e)=>{e.stopPropagation();S.screen=b.dataset.go2;render();});
  document.querySelectorAll("[data-cell]").forEach(b=>b.onclick=()=>{S.openCell=b.dataset.cell;render();});
  const cc=document.querySelector("[data-closecell]"); if(cc) cc.onclick=()=>{S.openCell=null;render();};
  document.querySelectorAll("[data-u]").forEach(b=>b.onclick=()=>{
    const st=statements[S.i]; const cur=S.answers[st.id]||{w:1};
    S.answers[st.id]={u:parseFloat(b.dataset.u), w:cur.w||1}; save();
    setTimeout(()=>{ if(S.i<statements.length-1){S.i++;} else {S.screen="ergebnis";} render(); },140);
  });
  const easy=document.getElementById("easy"); if(easy) easy.onchange=()=>{S.easy=easy.checked;save();render();};
  const skip=document.querySelector("[data-skip]"); if(skip) skip.onclick=()=>{ const st=statements[S.i]; delete S.answers[st.id]; save();
    if(S.i<statements.length-1){S.i++;render();} else {S.screen="ergebnis";render();} };
  const wt=document.querySelector("[data-weight]"); if(wt) wt.onclick=()=>{ const st=statements[S.i]; const cur=S.answers[st.id];
    if(cur){cur.w=cur.w===2?1:2; save(); render();} };
  const back=document.querySelector("[data-back]"); if(back) back.onclick=()=>{ if(S.i>0){S.i--;render();} };
  document.querySelectorAll("[data-party]").forEach(b=>b.onclick=(e)=>{e.stopPropagation();const pid=b.dataset.party;S.openParty=S.openParty===pid?null:pid;render();});
  document.querySelectorAll("[data-beleg]").forEach(b=>b.onclick=(e)=>{e.stopPropagation();const k=b.dataset.beleg;S.openBeleg[k]=!S.openBeleg[k];render();});
}

function renderLoading(){
  document.getElementById("app").innerHTML=`<div class="pad" style="min-height:100vh">
    <div class="eyebrow">Wahlkompass</div>
    <div class="skel" style="height:38px;margin-top:40px"></div>
    <div class="skel" style="height:38px;margin-top:10px;width:80%"></div>
    <div class="skel" style="height:80px;margin-top:24px"></div>
    <div class="sub" style="margin-top:24px;font-size:12px">Bündel wird geladen und im Browser geprüft …</div>
  </div>`;
}
function renderFailed(res){
  const blocking = res.blocking;
  document.getElementById("app").innerHTML=`<div class="pad" style="min-height:100vh;display:flex;flex-direction:column;gap:14px">
    <div class="eyebrow">Wahlkompass · ${(res.meta&&res.meta.release)||"2026.11.1-preview"}</div>
    <div class="h2" style="color:${blocking?'#8a2a2a':'var(--signal)'}">${blocking?'Signatur fehlt':'Signatur nicht geprüft'}</div>
    <div class="${blocking?'fail':'warn'}">${res.reason}</div>
    <div class="sub" style="font-size:13px">${blocking
      ? 'Die Daten stammen möglicherweise nicht vom signierten Original. Aus Sicherheitsgründen werden keine Ergebnisse angezeigt.'
      : 'Sie können die Daten ansehen, aber die Echtheit wurde nicht bestätigt.'}</div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn ghost" style="flex:1" onclick="location.reload()">Neu laden</button>
      <a class="btn ghost" style="flex:1" href="https://github.com/urholyness/wahlkompass" target="_blank" rel="noopener">Quelle prüfen</a>
    </div>
    ${!blocking?`<button class="btn primary" id="anyway">Ungeprüft fortfahren</button>`:''}
  </div>`;
  const a=document.getElementById("anyway");
  if(a) a.onclick=()=>{ boot(res, true); };
}

function boot(res, force){
  const f=res.files;
  RELEASE={meta:Object.assign({}, res.meta, {signature_verified: !!res.ok}),
    statements:f.statements, parties:f.parties, positions:f.positions, evidence:f.evidence,
    seats:f.seats, exclusions:f.exclusions};
  ({meta, statements, parties, positions, evidence} = RELEASE);
  render();
}

(async ()=>{
  renderLoading();
  let res;
  try{ res = await loadAndVerify(); }
  catch(e){ res={ok:false, blocking:true, reason:"Das Bündel konnte nicht geladen werden ("+(e.message||e)+")."}; }
  if(res.ok){ boot(res); }
  else if(res.unsupported && res.files){ boot(res); }   // can't verify -> show with seal withheld
  else if(res.unsupported){ /* meta only, refetch files unverified */ renderFailed(res); }
  else { renderFailed(res); }
})();
</script>
